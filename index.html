<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="icon" type="image/png" href="%BASE_URL%app-icon.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%app-icon.png" />
    <link rel="manifest" href="%BASE_URL%site.webmanifest" />
    <meta name="theme-color" content="#f75b04" />
    <script>
      try {
        const theme = localStorage.getItem('blobba.theme.v1') === 'neon' ? 'neon' : 'light'
        document.documentElement.dataset.theme = theme
        document.querySelector('meta[name="theme-color"]').content = theme === 'neon' ? '#120012' : '#f75b04'
      } catch {
        document.documentElement.dataset.theme = 'light'
      }
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5, viewport-fit=cover" />
    <title>BLOBBA</title>
  </head>
  <body>
    <div class="app-neon-background" aria-hidden="true"></div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
